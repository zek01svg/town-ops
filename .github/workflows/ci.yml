name: TownOps CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  quality:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync

      - name: Check Formatting
        run: pnpm prettier --config tooling/prettier/prettier.config.js --check .

      - name: Lint JS/TS
        run: pnpm lint:js

      - name: Lint Python
        run: pnpm lint:py

  test-js:
    name: Test TS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install TS dependencies
        run: pnpm install --frozen-lockfile
      - name: Run TS Tests
        run: pnpm -r test
        continue-on-error: true

  test-py:
    name: Test Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Python dependencies
        run: uv sync
      - name: Run Python Tests
        run: uv run pytest
        continue-on-error: true
