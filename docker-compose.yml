services:
  # ─── Infrastructure ───────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: townops
      POSTGRES_PASSWORD: townops
      POSTGRES_DB: townops
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U townops"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── Atoms ────────────────────────────────────────────────────────────────────

  auth-atom:
    build: apps/atoms/auth
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 5001
      DATABASE_URL: postgresql://townops:townops@postgres:5432/townops
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: http://auth-atom:5001
    ports:
      - "5001:5001"

  alert-atom:
    build: apps/atoms/alert
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      PORT: 5002
      DATABASE_URL: postgresql://townops:townops@postgres:5432/townops
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      RESEND_API_KEY: ${RESEND_API_KEY}
    ports:
      - "5002:5002"

  appointment-atom:
    build: apps/atoms/appointment
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 5003
      DATABASE_URL: postgresql://townops:townops@postgres:5432/townops
    ports:
      - "5003:5003"

  assignment-atom:
    build: apps/atoms/assignment
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 5004
      DATABASE_URL: postgresql://townops:townops@postgres:5432/townops
    ports:
      - "5004:5004"

  case-atom:
    build: apps/atoms/case
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 5005
      DATABASE_URL: postgresql://townops:townops@postgres:5432/townops
    ports:
      - "5005:5005"

  metrics-atom:
    build: apps/atoms/metrics
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 5006
      DATABASE_URL: postgresql://townops:townops@postgres:5432/townops
    ports:
      - "5006:5006"

  proof-atom:
    build: apps/atoms/proof
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 5007
      DATABASE_URL: postgresql://townops:townops@postgres:5432/townops
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
    ports:
      - "5007:5007"

  resident-atom:
    build: apps/atoms/resident
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 5008
      DATABASE_URL: postgresql://townops:townops@postgres:5432/townops
    ports:
      - "5008:5008"

  contractor-atom:
    build: apps/atoms/contractor
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 5009
      DATABASE_URL: postgresql://townops:townops@postgres:5432/townops
    ports:
      - "5009:5009"

  # ─── Composites ───────────────────────────────────────────────────────────────

  open-case-composite:
    build: apps/composites/open-case
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      PORT: 6001
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      RESIDENT_ATOM_URL: http://resident-atom:5008
      CASE_ATOM_URL: http://case-atom:5005
      JWKS_URI: http://auth-atom:5001/api/auth/jwks
    ports:
      - "6001:6001"

  assign-job-composite:
    build: apps/composites/assign-job
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      PORT: 6002
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      CONTRACTOR_ATOM_URL: http://contractor-atom:5009
      ASSIGNMENT_ATOM_URL: http://assignment-atom:5004
      METRICS_ATOM_URL: http://metrics-atom:5006
    ports:
      - "6002:6002"

  accept-job-composite:
    build: apps/composites/accept-job
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      PORT: 6003
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      ASSIGNMENT_ATOM_URL: http://assignment-atom:5004
      CASE_ATOM_URL: http://case-atom:5005
      APPOINTMENT_ATOM_URL: http://appointment-atom:5003
      JWKS_URI: http://auth-atom:5001/api/auth/jwks
    ports:
      - "6003:6003"

  close-case-composite:
    build: apps/composites/close-case
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      PORT: 6004
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      CASE_ATOM_URL: http://case-atom:5005
      PROOF_ATOM_URL: http://proof-atom:5007
      JWKS_URI: http://auth-atom:5001/api/auth/jwks
    ports:
      - "6004:6004"

  handle-breach-composite:
    build: apps/composites/handle-breach
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      PORT: 6005
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      CASE_ATOM_URL: http://case-atom:5005
      ASSIGNMENT_ATOM_URL: http://assignment-atom:5004
      METRICS_ATOM_URL: http://metrics-atom:5006
      CONTRACTOR_ATOM_URL: http://contractor-atom:5009
      JWKS_URI: http://auth-atom:5001/api/auth/jwks
    ports:
      - "6005:6005"

  reschedule-job-composite:
    build: apps/composites/reschedule-job
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      PORT: 6006
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      RESIDENT_ATOM_URL: http://resident-atom:5008
      APPOINTMENT_ATOM_URL: http://appointment-atom:5003
      CASE_ATOM_URL: http://case-atom:5005
      JWKS_URI: http://auth-atom:5001/api/auth/jwks
    ports:
      - "6006:6006"

  handle-no-access-composite:
    build: apps/composites/handle-no-access
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      PORT: 6007
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      CASE_ATOM_URL: http://case-atom:5005
      RESIDENT_ATOM_URL: http://resident-atom:5008
      JWKS_URI: http://auth-atom:5001/api/auth/jwks
    ports:
      - "6007:6007"

  # ─── Frontends ────────────────────────────────────────────────────────────────

  officer-frontend:
    build: apps/frontend/officer
    restart: unless-stopped
    environment:
      PORT: 3000
    ports:
      - "3001:3000"

  contractor-frontend:
    build: apps/frontend/contractor
    restart: unless-stopped
    environment:
      PORT: 3000
    ports:
      - "3002:3000"

  resident-frontend:
    build: apps/frontend/resident
    restart: unless-stopped
    environment:
      PORT: 3000
    ports:
      - "3003:3000"

volumes:
  postgres_data:
