version: '3.8'

services:
  # --- Messaging ---
  rabbitmq:
    image: rabbitmq:4.2.4-management-alpine
    container_name: townops-mq
    ports:
      - '5672:5672' # AMQP
      - '15672:15672' # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbitmq load_definitions \"/etc/rabbitmq/definitions.json\""
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    networks:
      - hdbcare-net

  # --- API Gateway ---
  kong:
    image: kong:3.9
    container_name: townops-gateway
    environment:
      KONG_DATABASE: 'off'
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_LISTEN: 0.0.0.0:8000
    volumes:
      - ./kong/kong.yml:/usr/local/kong/declarative/kong.yml
    ports:
      - '8000:8000' # Proxy
      - '8001:8001' # Admin API
    networks:
      - hdbcare-net

  # --- Assignment Service ---
  assignment:
    build:
      context: ../apps/atoms/assignment
      dockerfile: Dockerfile
    container_name: townops-assignment
    ports:
      - '5003:5003'
    environment:
      PORT: 5003
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      DATABASE_URL: ${ASSIGNMENT_DATABASE_URL} # TODO: add the supabase URL
    depends_on:
      - rabbitmq
    networks:
      - hdbcare-net

  # --- Assign Job Composite ---
  assign-job:
    build:
      context: ../apps/composites/assign-job
      dockerfile: Dockerfile
    container_name: townops-assign-job
    ports:
      - '6002:6002'
    environment:
      PORT: 6002
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      CONTRACTOR_API_URL: ${CONTRACTOR_API_URL}
      ASSIGNMENT_URL: http://assignment:5003
      METRICS_URL: http://metrics:5007
    depends_on:
      - rabbitmq
      - assignment
    networks:
      - hdbcare-net

networks:
  hdbcare-net:
    driver: bridge

volumes:
  rabbitmq_data:
